server:
  port: 8761

spring:
  application:
    name: eureka-server
  security:
    user:
      name: ${EUREKA_USER:eureka-admin}
      password: ${EUREKA_PASSWORD:eureka-secret-2024}

eureka:
  instance:
    hostname: ${EUREKA_HOST:localhost}
    prefer-ip-address: false
  client:
    # This is the registry itself — don't register with itself
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${spring.security.user.name}:${spring.security.user.password}@${eureka.instance.hostname}:${server.port}/eureka/
  server:
    # Disable self-preservation in dev (enable in prod)
    enable-self-preservation: ${EUREKA_SELF_PRESERVATION:false}
    eviction-interval-timer-in-ms: 5000
    renewal-percent-threshold: 0.85
    renewal-threshold-update-interval-ms: 900000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.netflix.eureka: WARN
    com.netflix.discovery: WARN
    com.investrac: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
