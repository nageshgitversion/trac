server:
  port: 8080

spring:
  application:
    name: api-gateway

  config:
    import: "optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8888"

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          "[/**]":
            allowed-origins:
              - "http://localhost:4200"
              - "https://app.investrac.in"
            allowed-methods: ["GET","POST","PUT","DELETE","PATCH","OPTIONS"]
            allowed-headers: ["*"]
            exposed-headers: ["Authorization","X-Trace-Id"]
            allow-credentials: true
            max-age: 3600

      # Default filters applied to every route
      default-filters:
        - name: Retry
          args:
            retries: 3
            statuses: SERVICE_UNAVAILABLE,BAD_GATEWAY,GATEWAY_TIMEOUT,INTERNAL_SERVER_ERROR
            methods: GET,POST,PUT,DELETE,PATCH
            backoff:
              firstBackoff: 200ms
              maxBackoff: 2s
              factor: 2
              basedOnPreviousValue: false

      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: auth-service
                fallbackUri: forward:/fallback/auth

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - name: CircuitBreaker
              args:
                name: user-service
                fallbackUri: forward:/fallback/user

        - id: wallet-service
          uri: lb://wallet-service
          predicates:
            - Path=/api/wallet/**
          filters:
            - name: CircuitBreaker
              args:
                name: wallet-service
                fallbackUri: forward:/fallback/wallet

        - id: transaction-service
          uri: lb://transaction-service
          predicates:
            - Path=/api/transactions/**
          filters:
            - name: CircuitBreaker
              args:
                name: transaction-service
                fallbackUri: forward:/fallback/transaction

        - id: account-service
          uri: lb://account-service
          predicates:
            - Path=/api/accounts/**
          filters:
            - name: CircuitBreaker
              args:
                name: account-service
                fallbackUri: forward:/fallback/account

        - id: portfolio-service
          uri: lb://portfolio-service
          predicates:
            - Path=/api/portfolio/**
          filters:
            - name: CircuitBreaker
              args:
                name: portfolio-service
                fallbackUri: forward:/fallback/portfolio

        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/api/ai/**
          filters:
            - name: CircuitBreaker
              args:
                name: ai-service
                fallbackUri: forward:/fallback/ai

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - name: CircuitBreaker
              args:
                name: notification-service
                fallbackUri: forward:/fallback/notification

        - id: openapi-auth
          uri: lb://auth-service
          predicates:
            - Path=/v3/api-docs/auth
          filters:
            - RewritePath=/v3/api-docs/auth, /v3/api-docs

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USER:eureka-admin}:${EUREKA_PASSWORD:eureka-secret-2024}@${EUREKA_HOST:localhost}:8761/eureka/
    registry-fetch-interval-seconds: 5
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
        slow-call-duration-threshold: 5s
        slow-call-rate-threshold: 80
    instances:
      auth-service:
        base-config: default
      user-service:
        base-config: default
      wallet-service:
        base-config: default
      transaction-service:
        base-config: default
      account-service:
        base-config: default
      portfolio-service:
        base-config: default
      ai-service:
        base-config: default
        slow-call-duration-threshold: 30s
        slow-call-rate-threshold: 90
      notification-service:
        base-config: default
  timelimiter:
    configs:
      default:
        timeout-duration: 10s
        cancel-running-future: true
    instances:
      auth-service:
        base-config: default
      user-service:
        base-config: default
      wallet-service:
        base-config: default
      transaction-service:
        base-config: default
      account-service:
        base-config: default
      portfolio-service:
        base-config: default
      ai-service:
        base-config: default
        timeout-duration: 30s
      notification-service:
        base-config: default

security:
  jwt:
    public-key: ${JWT_PUBLIC_KEY}

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.investrac: DEBUG
    org.springframework.cloud.gateway: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{traceId}/%X{spanId}] %-5level %logger{36} - %msg%n"
