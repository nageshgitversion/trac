# ═══════════════════════════════════════════════════════════════
# INVESTRAC — Local MySQL Override
# ═══════════════════════════════════════════════════════════════
# Use this override to connect services to your LOCAL MySQL
# instead of the Docker MySQL container.
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.local-mysql.yml up -d
#
# Prerequisites:
#   1. MySQL 8.0+ installed and running locally on port 3306
#   2. A root (or equivalent) user accessible from Docker containers
#   3. Grant permissions:
#      mysql> CREATE USER 'root'@'%' IDENTIFIED BY 'root';
#      mysql> GRANT ALL PRIVILEGES ON *.* TO 'root'@'%' WITH GRANT OPTION;
#      mysql> FLUSH PRIVILEGES;
#
# Notes:
#   - No MySQL container is started; services connect directly
#     to the host MySQL via "host.docker.internal".
#   - On Linux, the extra_hosts entry maps it to host-gateway.
#   - Databases are auto-created via "createDatabaseIfNotExist=true"
#     in each service's JDBC URL.
# ═══════════════════════════════════════════════════════════════

name: investrac

services:

  # ─────────────────────────────────────────
  # Disable Docker MySQL — not needed when
  # using a local MySQL installation.
  # ─────────────────────────────────────────
  mysql:
    image: busybox:latest
    container_name: investrac-mysql-noop
    entrypoint: ["true"]
    restart: "no"
    volumes: !reset []
    ports: !reset []
    environment:
      MYSQL_ROOT_PASSWORD: unused
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 1s
      retries: 1

  # ─────────────────────────────────────────
  # AUTH SERVICE — use local MySQL
  # ─────────────────────────────────────────
  auth-service:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: !override
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: host.docker.internal
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}

  # ─────────────────────────────────────────
  # WALLET SERVICE — use local MySQL
  # ─────────────────────────────────────────
  wallet-service:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: !override
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      DB_HOST: host.docker.internal
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}

  # ─────────────────────────────────────────
  # TRANSACTION SERVICE — use local MySQL
  # ─────────────────────────────────────────
  transaction-service:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: !override
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      wallet-service:
        condition: service_started
    environment:
      DB_HOST: host.docker.internal
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}

  # ─────────────────────────────────────────
  # PORTFOLIO SERVICE — use local MySQL
  # ─────────────────────────────────────────
  portfolio-service:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: !override
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      DB_HOST: host.docker.internal
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}

  # ─────────────────────────────────────────
  # AI SERVICE — use local MySQL
  # ─────────────────────────────────────────
  ai-service:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: !override
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      DB_HOST: host.docker.internal
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}

  # ─────────────────────────────────────────
  # ACCOUNT SERVICE — use local MySQL
  # ─────────────────────────────────────────
  account-service:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: !override
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      DB_HOST: host.docker.internal
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}

  # ─────────────────────────────────────────
  # NOTIFICATION SERVICE — use local MySQL
  # ─────────────────────────────────────────
  notification-service:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: !override
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      DB_HOST: host.docker.internal
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}

  # ─────────────────────────────────────────
  # USER SERVICE — use local MySQL
  # ─────────────────────────────────────────
  user-service:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: !override
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      DB_HOST: host.docker.internal
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
