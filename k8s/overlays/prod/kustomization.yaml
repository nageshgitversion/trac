apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

namespace: investrac

# Production patches
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: transaction-service

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: api-gateway

images:
  - name: investrac/auth-service
    newTag: "latest"
  - name: investrac/api-gateway
    newTag: "latest"
  - name: investrac/wallet-service
    newTag: "latest"
  - name: investrac/transaction-service
    newTag: "latest"
