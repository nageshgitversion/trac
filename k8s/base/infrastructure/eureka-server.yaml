apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-server
  namespace: investrac
spec:
  replicas: 2        # 2 Eureka peers for HA
  selector:
    matchLabels:
      app: eureka-server
  template:
    metadata:
      labels:
        app: eureka-server
    spec:
      containers:
        - name: eureka-server
          image: investrac/eureka-server:latest
          ports:
            - containerPort: 8761
          resources:
            requests: { cpu: 200m, memory: 384Mi }
            limits:   { cpu: 400m, memory: 512Mi }
          env:
            - name: EUREKA_USER
              valueFrom:
                configMapKeyRef:
                  name: investrac-config
                  key: EUREKA_USER
            - name: EUREKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: investrac-secrets
                  key: eureka-password
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 45
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: eureka-server
  namespace: investrac
spec:
  selector:
    app: eureka-server
  ports:
    - port: 8761
      targetPort: 8761
  type: ClusterIP
