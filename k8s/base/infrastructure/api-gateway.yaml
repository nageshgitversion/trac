apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: investrac
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: investrac/api-gateway:latest
          ports:
            - containerPort: 8080
          resources:
            requests: { cpu: 300m, memory: 512Mi }
            limits:   { cpu: 600m, memory: 1Gi }
          env:
            - name: EUREKA_HOST
              valueFrom:
                configMapKeyRef:
                  name: investrac-config
                  key: EUREKA_HOST
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: investrac-config
                  key: REDIS_HOST
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: investrac-secrets
                  key: redis-password
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: investrac-secrets
                  key: jwt-public-key
            - name: ZIPKIN_HOST
              valueFrom:
                configMapKeyRef:
                  name: investrac-config
                  key: ZIPKIN_HOST
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: investrac
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
# Ingress — routes external traffic to API Gateway
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: investrac-ingress
  namespace: investrac
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.investrac.in
      secretName: investrac-tls
  rules:
    - host: api.investrac.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
---
# HPA for API Gateway
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: investrac
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
