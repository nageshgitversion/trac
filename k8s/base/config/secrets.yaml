# ═══════════════════════════════════════════════════════════════════════
# INVESTRAC Secrets
# DO NOT commit real values — use kubectl create secret or AWS Secrets Manager
#
# Create in production:
#   kubectl create secret generic investrac-secrets \
#     --from-literal=db-password=$DB_PASSWORD \
#     --from-literal=jwt-private-key=$JWT_PRIVATE_KEY \
#     --from-literal=jwt-public-key=$JWT_PUBLIC_KEY \
#     --from-literal=redis-password=$REDIS_PASSWORD \
#     --from-literal=encryption-key=$ENCRYPTION_KEY \
#     --from-literal=anthropic-api-key=$ANTHROPIC_API_KEY \
#     -n investrac
# ═══════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: investrac-secrets
  namespace: investrac
type: Opaque
stringData:
  db-password:        "REPLACE_WITH_REAL_VALUE"
  db-root-password:   "REPLACE_WITH_REAL_VALUE"
  redis-password:     "REPLACE_WITH_REAL_VALUE"
  jwt-private-key:    "REPLACE_WITH_BASE64_RSA_PRIVATE_KEY"
  jwt-public-key:     "REPLACE_WITH_BASE64_RSA_PUBLIC_KEY"
  encryption-key:     "REPLACE_WITH_64_HEX_CHARS"
  eureka-password:    "eureka-secret-k8s"
  config-password:    "config-secret-k8s"
  admin-password:     "admin-secret-k8s"
  anthropic-api-key:  "REPLACE_WITH_REAL_API_KEY"
  firebase-creds:     "REPLACE_WITH_BASE64_FIREBASE_JSON"
