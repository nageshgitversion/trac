# ═══════════════════════════════════════════════════════════
# INVESTRAC — account-service
# Port: 8085 | Replicas: 2
# ═══════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-service
  namespace: investrac
  labels:
    app: account-service
    version: "1.0"
    app.kubernetes.io/part-of: investrac
spec:
  replicas: 2
  selector:
    matchLabels:
      app: account-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0       # Zero-downtime deployment
  template:
    metadata:
      labels:
        app: account-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8085"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: account-service
          image: investrac/account-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8085
              name: http
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          env:
            - name: SERVER_PORT
              value: "8085"
            - name: DB_HOST
              value: "mysql-account"
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: investrac-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: investrac-secrets
                  key: db-password
            - name: EUREKA_HOST
              valueFrom:
                configMapKeyRef:
                  name: investrac-config
                  key: EUREKA_HOST
            - name: EUREKA_USER
              valueFrom:
                configMapKeyRef:
                  name: investrac-config
                  key: EUREKA_USER
            - name: EUREKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: investrac-secrets
                  key: eureka-password
            - name: KAFKA_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: investrac-config
                  key: KAFKA_SERVERS
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: investrac-config
                  key: REDIS_HOST
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: investrac-secrets
                  key: redis-password
            - name: ZIPKIN_HOST
              valueFrom:
                configMapKeyRef:
                  name: investrac-config
                  key: ZIPKIN_HOST
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: investrac-secrets
                  key: jwt-public-key

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8085
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]  # Allow in-flight requests to complete
---
apiVersion: v1
kind: Service
metadata:
  name: account-service
  namespace: investrac
  labels:
    app: account-service
spec:
  selector:
    app: account-service
  ports:
    - port: 8085
      targetPort: 8085
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: account-service-hpa
  namespace: investrac
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: account-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
