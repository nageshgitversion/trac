server:
  port: 8087

spring:
  application:
    name: ai-service

  config:
    import: optional:configserver:http://${CONFIG_SERVER_USER:config-admin}:${CONFIG_SERVER_PASSWORD:config-secret}@${CONFIG_SERVER_HOST:localhost}:8888

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/investrac_ai?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata&createDatabaseIfNotExist=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: AiServicePool
      maximum-pool-size: 5    # Small pool — AI calls are slow, not high throughput
      minimum-idle: 1
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair-on-migrate: true
    out-of-order: false
    connect-retries: 10
    connect-retries-interval: 15

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

# Eureka
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USER:eureka-admin}:${EUREKA_PASSWORD:eureka-secret-2024}@${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10

# Anthropic Claude API
anthropic:
  api-key: ${ANTHROPIC_API_KEY}    # From environment variable — NEVER hardcode

# Internal service calls
services:
  gateway-url: http://${GATEWAY_HOST:api-gateway}:8080
  internal-token: ${INTERNAL_SERVICE_TOKEN:}  # JWT for service-to-service calls

# JWT (for verifying user requests)
security:
  jwt:
    public-key: ${JWT_PUBLIC_KEY}

# Scheduler config
ai:
  insight-scheduler:
    enabled: ${AI_SCHEDULER_ENABLED:true}
    max-users-per-run: ${AI_MAX_USERS:100}
    delay-ms-between-users: ${AI_USER_DELAY_MS:500}

# Spring Boot Admin
spring.boot.admin.client:
  url: http://${ADMIN_SERVER_HOST:localhost}:9090
  username: ${ADMIN_USER:admin}
  password: ${ADMIN_PASSWORD:admin-secret}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,scheduledtasks
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: 0.1    # 10% sampling for AI — calls are expensive
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans
  metrics:
    tags:
      application: ${spring.application.name}

# SpringDoc
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Logging — NEVER log AI message content
logging:
  level:
    com.investrac: DEBUG
    com.investrac.ai.client: INFO   # Reduce logging for Claude client (privacy)
    com.investrac.ai.service: INFO
    reactor.netty: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{traceId:-}/%X{spanId:-}] [%thread] %-5level %logger{36} - %msg%n"
